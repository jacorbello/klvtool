version: 2

builds:
  - main: ./cmd/klvtool
    binary: klvtool
    ldflags:
      - -s -w
      - -X github.com/jacorbello/klvtool/internal/version.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github-native

release:
  use_existing_draft: true
  github:
    owner: jacorbello
    name: klvtool
